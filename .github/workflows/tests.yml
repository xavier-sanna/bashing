---
name: Tests

"on":
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  bats:
    name: Bats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run Bats suite
        run: mise run test
